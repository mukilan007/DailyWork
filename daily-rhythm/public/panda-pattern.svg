<svg xmlns="http://www.w3.org/2000/svg" width="280" height="280" viewBox="0 0 280 280" aria-hidden="true">
  <!-- Background-pattern tile combining panda heads, bamboo, leaves, paws and hearts.
       Tinted softly so it sits behind UI content without dominating it. -->
  <g opacity="0.9">
    <!-- Bamboo stalks -->
    <g stroke="#16a34a" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.32">
      <path d="M22 0 L22 50" />
      <path d="M22 60 L22 110" />
      <path d="M22 120 L22 170" />
      <path d="M22 180 L22 240" />
      <path d="M258 20 L258 80" />
      <path d="M258 90 L258 150" />
      <path d="M258 160 L258 220" />
      <path d="M258 230 L258 280" />
    </g>
    <!-- Bamboo nodes -->
    <g stroke="#15803d" stroke-width="2" stroke-linecap="round" opacity="0.4">
      <path d="M18 55 L26 55" />
      <path d="M18 115 L26 115" />
      <path d="M18 175 L26 175" />
      <path d="M254 85 L262 85" />
      <path d="M254 155 L262 155" />
      <path d="M254 225 L262 225" />
    </g>
    <!-- Bamboo leaves scattered around the stalks -->
    <g fill="#22c55e" opacity="0.35">
      <ellipse cx="34" cy="38" rx="13" ry="4.5" transform="rotate(-28 34 38)" />
      <ellipse cx="12" cy="92" rx="13" ry="4.5" transform="rotate(28 12 92)" />
      <ellipse cx="34" cy="148" rx="13" ry="4.5" transform="rotate(-28 34 148)" />
      <ellipse cx="12" cy="208" rx="13" ry="4.5" transform="rotate(28 12 208)" />
      <ellipse cx="246" cy="60" rx="13" ry="4.5" transform="rotate(28 246 60)" />
      <ellipse cx="270" cy="118" rx="13" ry="4.5" transform="rotate(-28 270 118)" />
      <ellipse cx="246" cy="190" rx="13" ry="4.5" transform="rotate(28 246 190)" />
      <ellipse cx="270" cy="248" rx="13" ry="4.5" transform="rotate(-28 270 248)" />
    </g>

    <!-- Panda head — top-left cluster -->
    <g transform="translate(76,50)">
      <circle cx="8" cy="6" r="7" fill="#1f2937" opacity="0.85"/>
      <circle cx="34" cy="6" r="7" fill="#1f2937" opacity="0.85"/>
      <ellipse cx="21" cy="22" rx="19" ry="17" fill="#ffffff"/>
      <ellipse cx="13" cy="20" rx="4.2" ry="6" fill="#1f2937" opacity="0.85" transform="rotate(-18 13 20)"/>
      <ellipse cx="29" cy="20" rx="4.2" ry="6" fill="#1f2937" opacity="0.85" transform="rotate(18 29 20)"/>
      <circle cx="13.4" cy="20.4" r="1.1" fill="#fff"/>
      <circle cx="29.4" cy="20.4" r="1.1" fill="#fff"/>
      <ellipse cx="21" cy="28" rx="2.4" ry="1.6" fill="#111827"/>
      <path d="M21 30 V32 M21 32 Q19 34 17 32 M21 32 Q23 34 25 32" stroke="#111827" stroke-width="1.2" fill="none" stroke-linecap="round"/>
    </g>

    <!-- Panda head — center-right -->
    <g transform="translate(180,150)">
      <circle cx="8" cy="6" r="6" fill="#1f2937" opacity="0.85"/>
      <circle cx="30" cy="6" r="6" fill="#1f2937" opacity="0.85"/>
      <ellipse cx="19" cy="20" rx="16" ry="14" fill="#ffffff"/>
      <ellipse cx="12" cy="19" rx="3.6" ry="5" fill="#1f2937" opacity="0.85" transform="rotate(-18 12 19)"/>
      <ellipse cx="26" cy="19" rx="3.6" ry="5" fill="#1f2937" opacity="0.85" transform="rotate(18 26 19)"/>
      <circle cx="12.4" cy="19.4" r="1" fill="#fff"/>
      <circle cx="26.4" cy="19.4" r="1" fill="#fff"/>
      <ellipse cx="19" cy="25" rx="2" ry="1.3" fill="#111827"/>
    </g>

    <!-- Paw print clusters -->
    <g fill="#ec4899" opacity="0.32">
      <g transform="translate(60,210)">
        <ellipse cx="10" cy="12" rx="7" ry="6"/>
        <circle cx="2" cy="4" r="3"/>
        <circle cx="10" cy="0" r="3"/>
        <circle cx="18" cy="4" r="3"/>
        <circle cx="-3" cy="11" r="2.4"/>
      </g>
      <g transform="translate(200,80)">
        <ellipse cx="10" cy="12" rx="7" ry="6"/>
        <circle cx="2" cy="4" r="3"/>
        <circle cx="10" cy="0" r="3"/>
        <circle cx="18" cy="4" r="3"/>
        <circle cx="23" cy="11" r="2.4"/>
      </g>
      <g transform="translate(135,225)">
        <ellipse cx="10" cy="12" rx="6.5" ry="5.5"/>
        <circle cx="2.5" cy="4" r="2.8"/>
        <circle cx="10" cy="0.5" r="2.8"/>
        <circle cx="17.5" cy="4" r="2.8"/>
      </g>
    </g>

    <!-- Hearts -->
    <g fill="#f43f5e" opacity="0.32">
      <path d="M140 90 q-4 -6 -10 -2 q-5 4 0 10 q4 5 10 9 q6 -4 10 -9 q5 -6 0 -10 q-6 -4 -10 2 z"/>
      <path d="M50 130 q-3 -4.5 -7.5 -1.5 q-3.5 3 0 7.5 q3 4 7.5 6.5 q4.5 -2.5 7.5 -6.5 q3.5 -4.5 0 -7.5 q-4.5 -3 -7.5 1.5 z"/>
    </g>

    <!-- Stars/sparkles for liveliness -->
    <g fill="#fbbf24" opacity="0.45">
      <circle cx="120" cy="170" r="2"/>
      <circle cx="220" cy="40" r="2"/>
      <circle cx="100" cy="245" r="2"/>
      <circle cx="245" cy="265" r="2"/>
      <circle cx="160" cy="60" r="1.6"/>
    </g>
  </g>
</svg>
